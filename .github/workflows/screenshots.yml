name: Screenshots

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install web dependencies
        run: npm install react-dom react-native-web

      - name: Build for web
        run: npx expo export --platform web --output-dir dist

      - name: Install Playwright
        run: npx playwright install chromium

      - name: Capture screenshots
        run: |
          npx serve dist -l 8081 &
          sleep 5
          mkdir -p screenshots
          npx playwright screenshot --viewport-size="390,844" http://localhost:8081 screenshots/login.png

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/
